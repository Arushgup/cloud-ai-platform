version: "3.9"

services:

  redis:
    image: redis:7
    container_name: jobcopilot-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - job-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: jobcopilot-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - job-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: jobcopilot-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - job-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - job-network

  application-service:
    build:
      context: ./application-service
      dockerfile: Dockerfile
    container_name: application-service
    restart: always
    ports:
      - "8082:8082"
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - job-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - job-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service
      - application-service
      - ai-service
    networks:
      - job-network

networks:
  job-network:
    driver: bridge