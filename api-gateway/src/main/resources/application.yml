server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: application-service
          uri: http://application-service:8082
          predicates:
            - Path=/api/resume/**
            - Path=/api/resume

        - id: ai-service
          uri: http://ai-service:8000
          predicates:
            - Path=/api/v1/**

jwt:
  secret: mySuperSecretKeyForJwtGeneration12345