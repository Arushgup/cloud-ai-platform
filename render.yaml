services:
  - type: web
    name: auth-service
    runtime: java
    rootDir: auth-service
    buildCommand: ./mvnw clean package
    startCommand: java -jar target/*.jar

    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false

      - key: SPRING_DATASOURCE_USERNAME
        sync: false

      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      - key: JWT_SECRET
        sync: false